<div th:fragment="chatbot" class="chatbot-container">
    <!-- Floating Action Button -->
    <button id="chatbot-fab" class="chatbot-fab" onclick="toggleChatbot()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
        </svg>
    </button>

    <!-- Chatbot Window -->
    <div id="chatbot-window" class="chatbot-window hidden">
        <div class="chatbot-header">
            <div class="chatbot-title">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 20px; height: 20px;">
                    <rect x="3" y="11" width="18" height="10" rx="2"></rect>
                    <circle cx="12" cy="5" r="2"></circle>
                    <path d="M12 7v4"></path>
                    <line x1="8" y1="16" x2="8" y2="16"></line>
                    <line x1="16" y1="16" x2="16" y2="16"></line>
                </svg>
                JPM Assistant
            </div>
            <button class="chatbot-close" onclick="toggleChatbot()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>
        <div class="chatbot-messages" id="chatbot-messages">
            <div class="chat-message bot-message">
                Hello! I am the Job Portal Assistant. How can I help you today?
            </div>
        </div>
        <div class="chatbot-input">
            <input type="text" id="chatbot-input-field" placeholder="Type your message..." onkeypress="handleChatbotKeyPress(event)">
            <button onclick="sendChatMessage()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>

    <script>
        function toggleChatbot() {
            const chatbotWindow = document.getElementById('chatbot-window');
            chatbotWindow.classList.toggle('hidden');
        }

        function handleChatbotKeyPress(event) {
            if (event.key === 'Enter') {
                sendChatMessage();
            }
        }

        function sendChatMessage() {
            const inputField = document.getElementById('chatbot-input-field');
            const message = inputField.value.trim();
            if (message === '') return;

            addMessage(message, 'user-message');
            inputField.value = '';

            setTimeout(() => {
                const reply = generateBotReply(message.toLowerCase());
                addMessage(reply, 'bot-message');
            }, 500);
        }

        function addMessage(text, className) {
            const messagesContainer = document.getElementById('chatbot-messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `chat-message ${className}`;
            messageDiv.textContent = text;
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function generateBotReply(message) {
            if (message.includes('job') || message.includes('work')) {
                return 'You can browse available jobs by clicking "Browse Jobs" in the navigation bar.';
            } else if (message.includes('register') || message.includes('sign up')) {
                return 'To apply for jobs, please sign up as a Student. If you are an employer, you can sign up to post jobs.';
            } else if (message.includes('contact') || message.includes('support')) {
                return 'You can reach out to our support team at support@jobportal.com.';
            } else if (message.includes('hello') || message.includes('hi')) {
                return 'Hi there! How can I assist you with your job search today?';
            } else {
                return 'I am a jpm bot. I can help you find jobs, register, or contact support. What would you like to do?';
            }
        }
    </script>
</div>
